<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>리쥬란 정품 인증</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brand: #1B8B6E; --brand-dark: #147A5E; --brand-text: #FFFFFF;
  --brand-light: rgba(27,139,110,0.08); --brand-border: rgba(27,139,110,0.22); --brand-glow: rgba(27,139,110,0.12);
  --navy: #0D5C47; --navy-light: #116B53; --navy-lighter: #1B8B6E;
  --bg: #FFFFFF; --bg-2: #F7F8FA; --bg-3: #ECEEF1;
  --text-1: #191F28; --text-2: #4E5968; --text-3: #8B95A1; --text-4: #B0B8C1;
  --border: #E5E8EB; --border-light: #F2F3F5;
  --kakao: #FEE500; --kakao-text: #191600;
  --r: 8px; --r2: 16px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06); --shadow-sheet: 0 -4px 24px rgba(0,0,0,0.10);
  --url-bg: #0D5C47; --url-inner: #116B53; --url-text: #6B7280;
  --body-bg: #FFFFFF;
  --apple-bg: #000; --apple-color: #fff;
  --card-front-bg: #fff; --card-front-shadow: 0 8px 32px rgba(0,0,0,0.08);
  --card-back-bg1: #f8f9fa; --card-back-bg2: #e9ecef;
  --shimmer-alpha: 0.45;
  --input-bg: #FFFFFF;
}
body.dark {
  --brand-light: rgba(27,139,110,0.12); --brand-border: rgba(27,139,110,0.28); --brand-glow: rgba(27,139,110,0.18);
  --navy: #0D5C47; --navy-light: #0A4D3C; --navy-lighter: #116B53;
  --bg: #1A1D23; --bg-2: #22262E; --bg-3: #2A2E37;
  --text-1: #EAEDF1; --text-2: #A0A8B4; --text-3: #6B7280; --text-4: #4B5563;
  --border: #2E3340; --border-light: #262B35;
  --shadow: 0 8px 24px rgba(0,0,0,0.4); --shadow-sheet: 0 -4px 24px rgba(0,0,0,0.5);
  --body-bg: #111318;
  --apple-bg: #fff; --apple-color: #000;
  --card-front-bg: #2A2E37; --card-front-shadow: 0 8px 32px rgba(0,0,0,0.3);
  --card-back-bg1: #2A2E37; --card-back-bg2: #22262E;
  --shimmer-alpha: 0.08;
  --input-bg: #22262E;
}

body { margin:0; background:#f0f0f0; font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Pretendard',sans-serif; color:var(--text-1); -webkit-font-smoothing:antialiased; overflow-x:hidden; display:flex; justify-content:center; align-items:center; min-height:100vh; }
@media(max-width:400px){ body{background:var(--bg); min-height:auto; align-items:flex-start;} }

/* ── HEADER ── */
.header { width:100%; max-width:360px; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }
.header-left { display:flex; align-items:center; gap:8px; }
.header-logo { width:32px; height:32px; border-radius:var(--r); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:800; }
.header-title { font-size:14px; font-weight:700; }
.header-badge { font-size:11px; font-weight:700; padding:4px 8px; border-radius:var(--r); }
.reset-btn { font-size:11px; color:var(--text-3); background:var(--bg-2); border:1px solid var(--border); border-radius:var(--r); padding:8px; cursor:pointer; min-height:32px; font-family:inherit; }
.reset-btn:active { transform:scale(.94); }

/* ── URL BAR ── */
.url-bar { width:100%; max-width:360px; background:var(--url-bg); border-radius:var(--r2) var(--r2) 0 0; padding:8px 16px; display:flex; align-items:center; gap:8px; }
.url-dot { width:8px; height:8px; border-radius:50%; }
.url-text { flex:1; background:var(--url-inner); border-radius:var(--r); padding:4px 8px; font-size:10px; color:rgba(168,220,200,0.6); text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

/* ── PHONE FRAME ── */
.phone-frame { width:360px; max-width:100%; height:780px; margin:0 auto; background:var(--bg); overflow:hidden; position:relative; }
@media(max-width:400px){
  .phone-frame { width:100%; height:100dvh; }
}
.step-inner { height:100%; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.step-content { padding:0; animation:fadeIn .3s cubic-bezier(.22,1,.36,1); height:100%; overflow-y:auto; -webkit-overflow-scrolling:touch; }
@keyframes fadeIn { from{opacity:0;transform:translateX(24px)} to{opacity:1;transform:translateX(0)} }
@keyframes fadeBack { from{opacity:0;transform:translateX(-24px)} to{opacity:1;transform:translateX(0)} }
.step-content.back { animation-name:fadeBack; }

/* ── PROGRESS ── */
.top-progress { padding:12px 16px 0; }
.top-progress-bars { display:flex; gap:4px; }
.top-progress-bar { flex:1; height:3px; border-radius:2px; background:var(--border); transition:background .35s; }
.top-progress-info { display:flex; justify-content:space-between; margin-top:8px; font-size:11px; color:var(--text-3); }
.top-progress-label { font-weight:600; }

/* ── CERT LANDING ── */
.cert-landing { display:flex; flex-direction:column; align-items:center; padding:0 20px; height:780px; position:relative; background:var(--bg); }
@media(max-width:400px){
  .cert-landing { height:100dvh; }
}
.cert-landing-brand { font-size:10px; color:var(--brand); font-weight:600; letter-spacing:1.5px; margin-top:28px; margin-bottom:6px; text-transform:uppercase; }
@media(max-width:400px){
  .cert-landing-brand { margin-top:6vh; }
}
.cert-landing-title { font-size:22px; font-weight:800; text-align:center; line-height:1.3; margin-bottom:8px; letter-spacing:-.5px; }

/* ── CARD REVEAL ── */
.cert-card-scene { width:220px; height:346px; margin-bottom:0; position:relative; flex-shrink:0; }
@media(max-width:400px){
  .cert-card-scene { width:58vw; height:91vw; }
}
.cert-card-wrap {
  width:100%; height:100%; position:relative; border-radius:var(--r2); overflow:hidden;
  border:none; box-shadow:0 4px 24px rgba(0,0,0,0.10);
}
.cert-card-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
.cert-card-mask {
  position:absolute; bottom:0; left:0; right:0;
  height:100%; background:var(--bg);
  z-index:1;
  animation:revealMask 3.5s cubic-bezier(.4,.0,.2,1) forwards;
}
.cert-card-mask.done { height:0%; animation:none; }
@keyframes revealMask { 0%{height:100%} 100%{height:0%} }
.cert-card-scanline {
  position:absolute; left:0; right:0; height:2px; z-index:2;
  top:0;
  animation:revealScan 3.5s cubic-bezier(.4,.0,.2,1) forwards;
}
.cert-card-scanline.done { top:100%; animation:none; opacity:0; }
@keyframes revealScan { 0%{top:0%} 100%{top:100%} }
.cert-card-scanline::after {
  content:''; display:block; width:100%; height:2px;
  background:linear-gradient(90deg, transparent, currentColor 20%, currentColor 80%, transparent);
  box-shadow:0 0 8px currentColor, 0 0 16px currentColor;
  opacity:0.7;
}
.cert-card-shimmer {
  position:absolute; inset:0; border-radius:var(--r2); pointer-events:none; z-index:3;
  background:linear-gradient(105deg,transparent 35%,rgb(255 255 255 / var(--shimmer-alpha)) 50%,transparent 65%);
  background-size:250% 100%; background-position:250% 0;
  animation:shimmerOnce .8s ease-in-out 3.6s forwards;
}
.cert-card-shimmer.done { animation:none; background-position:-250% 0; }
@keyframes shimmerOnce { 0%{background-position:250% 0} 100%{background-position:-250% 0} }

/* Progress bar + pct */
.cert-progress { text-align:center; margin-bottom:6px; }
.cert-progress-pct { font-size:22px; font-weight:800; letter-spacing:-1px; }
.cert-progress-bar-wrap { width:60%; max-width:200px; height:3px; border-radius:2px; background:var(--border); margin:4px auto 0; overflow:hidden; }
.cert-progress-bar-fill { height:100%; border-radius:2px; animation:barFill 3.5s cubic-bezier(.4,.0,.2,1) forwards; }
@keyframes barFill { 0%{width:0%} 100%{width:100%} }
.cert-progress-label { font-size:10px; color:var(--text-3); margin-top:3px; transition:opacity .3s; }

/* Complete badge */
.cert-complete-badge {
  display:inline-flex; align-items:center; gap:4px;
  font-size:13px; font-weight:700; padding:8px 16px;
  border-radius:24px; margin-bottom:8px;
  opacity:0; transform:scale(0.8);
  animation:badgePop .4s cubic-bezier(.22,1,.36,1) 3.8s forwards;
}
@keyframes badgePop { 0%{opacity:0;transform:scale(0.8)} 100%{opacity:1;transform:scale(1)} }

/* ── SAVE BTN ── */
.btn-save-mobile { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; height:48px; border-radius:12px; border:none; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; transition:all .15s; box-shadow:0 4px 16px rgba(0,0,0,.12); opacity:0; transform:translateY(16px); margin-top:24px; margin-bottom:8px; }
.btn-save-mobile.show { animation:fadeUp .5s forwards; }
.btn-save-mobile:active { transform:scale(.97); }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
.save-sub { font-size:10px; color:var(--text-3); margin-top:0; margin-bottom:16px; opacity:0; }
.save-sub.show { animation:fadeUp .5s .15s forwards; }

/* ── LOGIN SHEET ── */
.login-sheet-backdrop { position:absolute; inset:0; background:rgba(0,0,0,.5); z-index:10; animation:fadeA .25s; display:flex; align-items:flex-end; justify-content:center; }
@keyframes fadeA { from{opacity:0} to{opacity:1} }
.login-sheet { width:100%; max-width:360px; background:var(--bg); border-radius:var(--r2) var(--r2) 0 0; padding:20px 16px 24px; box-shadow:var(--shadow-sheet); animation:sheetUp .35s cubic-bezier(.22,1,.36,1); border-top:1px solid var(--border); }
@keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sheet-handle { width:32px; height:4px; border-radius:2px; background:var(--border); margin:0 auto 12px; }
.sheet-title { font-size:15px; font-weight:800; margin-bottom:6px; }
.sheet-desc { font-size:12px; color:var(--text-2); line-height:1.55; margin-bottom:20px; }

/* ── LOGIN BTNS ── */
.btn-kakao { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; height:44px; border-radius:var(--r); background:var(--kakao); border:none; font-size:14px; font-weight:700; color:var(--kakao-text); cursor:pointer; font-family:inherit; }
.btn-kakao:active { transform:scale(.97); filter:brightness(.96); }
.btn-apple { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; height:44px; border-radius:var(--r); background:var(--apple-bg); border:none; font-size:14px; font-weight:700; color:var(--apple-color); cursor:pointer; font-family:inherit; margin-top:8px; }
.btn-apple:active { transform:scale(.97); }
.btn-email-signup { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; height:44px; border-radius:var(--r); background:transparent; border:1.5px solid var(--border); font-size:14px; font-weight:600; color:var(--text-2); cursor:pointer; font-family:inherit; margin-top:8px; }
.btn-email-signup:active { transform:scale(.97); background:var(--bg-2); }
.alt-login-toggle { display:flex; align-items:center; justify-content:center; gap:4px; font-size:12px; color:var(--text-3); font-weight:500; background:none; border:none; cursor:pointer; width:100%; padding:12px 0 6px; font-family:inherit; }
.alt-login-toggle svg { transition:transform .2s; }
.alt-login-toggle.open svg { transform:rotate(180deg); }
.alt-methods { overflow:hidden; transition:max-height .3s,opacity .3s; }
.alt-methods.collapsed { max-height:0; opacity:0; }
.alt-methods.expanded { max-height:200px; opacity:1; }

/* ── BUTTONS ── */
.btn-primary { display:flex; align-items:center; justify-content:center; width:100%; height:44px; padding:0 16px; border-radius:var(--r); border:none; font-size:14px; font-weight:700; cursor:pointer; transition:all .12s; font-family:inherit; }
.btn-primary:active:not(:disabled) { transform:scale(.97); }
.btn-primary:disabled { cursor:default; }
.btn-ghost { display:flex; align-items:center; justify-content:center; width:100%; height:44px; padding:0 16px; border-radius:var(--r); border:1.5px solid var(--border); background:var(--bg); font-size:14px; font-weight:600; color:var(--text-2); cursor:pointer; font-family:inherit; }
.btn-ghost:active { transform:scale(.97); }
.btn-secondary { flex:1; height:44px; background:var(--bg-2); color:var(--text-2); border:none; border-radius:var(--r); font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
.btn-secondary:active { transform:scale(.97); }
.btn-row { display:flex; gap:8px; }
.link-btn { background:none; border:none; font-size:13px; cursor:pointer; font-weight:600; font-family:inherit; min-height:40px; padding:0 8px; }

/* ── INPUTS ── */
.text-input { width:100%; height:42px; padding:0 14px; border:1.5px solid var(--border); border-radius:var(--r); font-size:13px; color:var(--text-1); background:var(--bg); outline:none; transition:border-color .15s,box-shadow .15s; font-family:inherit; }
.text-input:focus { border-color:var(--brand); box-shadow:0 0 0 3px var(--brand-glow); }
.text-input::placeholder { color:var(--text-4); }
.select-input { width:100%; height:42px; padding:0 40px 0 14px; border:1.5px solid var(--border); border-radius:var(--r); font-size:13px; color:var(--text-1); background:var(--bg) url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 16 16' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M4 6L8 10L12 6' stroke='%238B95A1' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 16px center; outline:none; appearance:none; -webkit-appearance:none; font-family:inherit; }

/* ── TYPOGRAPHY ── */
.section-pad { padding:14px 16px 24px; }
.center-view { text-align:center; padding-top:24px; }
.hero-title { font-size:18px; font-weight:800; margin-bottom:6px; letter-spacing:-.5px; line-height:1.35; }
.section-title { font-size:16px; font-weight:800; margin-bottom:6px; letter-spacing:-.3px; }
.body-text { font-size:13px; color:var(--text-2); line-height:1.5; }
.text-muted { font-size:11px; color:var(--text-4); }
.field-label { display:block; font-size:12px; font-weight:600; color:var(--text-2); margin-bottom:6px; }
.required { color:#F45452; font-weight:600; }
.chip { font-size:11px; padding:4px 8px; border-radius:var(--r); font-weight:600; display:inline-block; }
.chip-row { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }

/* ── HOSPITAL ── */
.hospital-search-wrap { margin-bottom:16px; }
.search-box { position:relative; margin-bottom:8px; }
.search-box input { padding-left:40px; }
.search-icon { position:absolute; left:16px; top:50%; transform:translateY(-50%); color:var(--text-3); pointer-events:none; }
.hospital-list { border:1px solid var(--border); border-radius:var(--r); overflow:hidden; }
.hospital-item { padding:12px; cursor:pointer; min-height:42px; transition:background .12s; border-bottom:1px solid var(--border-light); }
.hospital-item:last-child { border-bottom:none; }
.hospital-item:active { background:var(--bg-2); }

/* ── PRODUCT ── */
.product-card { display:flex; align-items:center; justify-content:space-between; padding:16px; border-radius:var(--r); margin-bottom:8px; }
.product-info { display:flex; align-items:center; gap:8px; flex:1; min-width:0; }
.product-name { font-size:13px; font-weight:600; }
.remove-btn { background:var(--bg-2); border:none; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; color:var(--text-3); cursor:pointer; }
.auth-methods { display:flex; flex-direction:column; gap:8px; }
.scan-panel { border:1px solid var(--border); border-radius:var(--r2); padding:16px; }
.panel-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.panel-title { font-size:14px; font-weight:700; }
.camera-mock { background:var(--url-bg); border-radius:var(--r); padding:32px 16px; text-align:center; }
.scan-divider { font-size:13px; color:var(--text-3); text-align:center; margin-bottom:8px; }
.scan-input-row { display:flex; gap:8px; }
.scan-submit-btn { padding:0 16px; min-height:48px; border:none; border-radius:var(--r); font-size:14px; font-weight:700; cursor:pointer; white-space:nowrap; font-family:inherit; }
.proc-tabs { display:flex; gap:8px; margin-bottom:16px; }
.proc-tab { flex:1; min-height:40px; padding:8px; border-radius:var(--r); cursor:pointer; text-align:center; font-family:inherit; font-size:13px; font-weight:600; }

/* ── REVIEW ── */
.review-card { background:var(--bg-2); border:1px solid var(--border); border-radius:var(--r2); padding:12px; margin-bottom:6px; }
.review-header { display:flex; justify-content:space-between; margin-bottom:6px; }
.review-label { font-size:11px; color:var(--text-3); font-weight:600; }
.review-hospital-name { font-size:14px; font-weight:700; }
.review-director { font-size:12px; font-weight:600; margin-top:3px; }
.review-row { display:flex; justify-content:space-between; font-size:13px; color:var(--text-2); margin-bottom:3px; line-height:1.5; }
.review-row strong { color:var(--text-1); font-weight:600; }
.review-product { display:flex; justify-content:space-between; align-items:center; padding:8px 0; }
.warn-banner { background:rgba(230,126,0,0.06); border-radius:var(--r); padding:6px 12px; margin-bottom:12px; font-size:11px; color:#E67E00; border:1px solid rgba(230,126,0,0.2); }

/* ── MODAL ── */
.modal-backdrop { position:absolute; inset:0; background:rgba(0,0,0,.48); display:flex; align-items:flex-end; justify-content:center; z-index:10; animation:fadeA .2s; }
.modal-sheet { background:var(--bg); border-radius:var(--r2) var(--r2) 0 0; padding:20px 16px 24px; width:100%; max-width:360px; box-shadow:var(--shadow-sheet); animation:sheetUp .3s cubic-bezier(.22,1,.36,1); border-top:1px solid var(--border); }
.modal-handle { width:32px; height:4px; border-radius:2px; background:var(--border); margin:0 auto 12px; }
.modal-title { font-size:15px; font-weight:800; margin-bottom:6px; text-align:center; }
.modal-desc { font-size:13px; color:var(--text-2); margin-bottom:20px; text-align:center; line-height:1.5; }

/* ── DONE ── */
.done-icon { width:60px; height:60px; border-radius:50%; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; font-size:28px; animation:popIn .4s cubic-bezier(.22,1,.36,1); }
@keyframes popIn { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }
.summary-card { background:var(--bg-2); border:1px solid var(--border); border-radius:var(--r2); padding:12px; margin-bottom:12px; text-align:left; }
.summary-label { font-size:11px; color:var(--text-3); margin-bottom:6px; font-weight:600; }
.summary-body { font-size:13px; color:var(--text-2); line-height:1.8; }
.cert-cta { border-radius:var(--r2); padding:12px; margin-bottom:20px; text-align:left; }
.cta-title { font-size:12px; font-weight:700; margin-bottom:6px; }
.cta-desc { font-size:11px; color:var(--text-2); line-height:1.5; }

/* ── MISC ── */
.cb { border-radius:var(--r); border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .15s; color:transparent; font-weight:700; }
.cb.lg { width:24px; height:24px; font-size:11px; }
.cb.sm { width:16px; height:16px; font-size:9px; border-radius:4px; }
.footer-note { max-width:360px; width:100%; margin-top:8px; padding:8px 16px; background:var(--bg-2); border:1px solid var(--border); border-radius:var(--r); font-size:11px; color:var(--text-3); line-height:1.6; }
.hidden { display:none !important; }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ═══ REJURAN DATA ═══ */
const PRODUCTS = {
  "스킨부스터": ["리쥬란 힐러","리쥬란 HB","리쥬란 턴오버","리쥬란 아이"]
};

const BRAND = {
  name: "리쥬란",
  nameEn: "REJURAN",
  mfr: "파마리서치",
  color: "#1B8B6E",
  navy: "#0D5C47",

/* ═══ COLOR UTILS ═══ */
function hexRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return{r,g,b};}
function lighten(h,a){const{r,g,b}=hexRgb(h);return`rgb(${Math.round(r+(255-r)*a)},${Math.round(g+(255-g)*a)},${Math.round(b+(255-b)*a)})`;}
function alpha(h,a){const{r,g,b}=hexRgb(h);return`rgba(${r},${g},${b},${a})`;}
function dk(){ return document.body.classList.contains('dark'); }
function pick(light,dark){ return dk()?dark:light; }

function theme(){
  const c=BRAND.color, d=dk();
  return {
    primary:c, tp:BRAND.tp, navy:BRAND.navy,
    light: d ? alpha(c,0.10) : lighten(c,0.88),
    lighter: d ? alpha(c,0.06) : lighten(c,0.93),
    border: d ? alpha(c,0.20) : lighten(c,0.62),
    glow: alpha(c, 0.14),
    shadow: alpha(c, d?0.30:0.18),
    badgeBg: d ? alpha(c,0.12) : lighten(c,0.86)
  };
}
function chipStyle(){ const t=theme(),d=dk(); return `background:${d?alpha(t.primary,0.12):lighten(t.primary,0.88)};color:${t.primary}`; }
function pbs(dis){ const t=theme(); return dis?`background:${pick('#E8EAED','#2E3340')};color:${pick('#8B95A1','#4B5563')};box-shadow:none`:`background:${t.navy};color:${t.tp};box-shadow:0 4px 16px ${alpha(t.navy,0.3)}`; }

let prevDirection='forward';
function go(next){
  const order=["LOADING","HOSPITAL","PATIENT","PRODUCT","CONFIRM","DONE"];
  const ci=order.indexOf(S.step), ni=order.indexOf(next);
  prevDirection = ni >= ci ? 'forward' : 'back';
  S.prevStep=S.step; S.step=next; render();
}

/* Phone verification */
let phoneTimerInterval = null;
function sendPhoneCode(){
  if(!S.patientPhone) return;
  S.phoneCodeSent=true; S.phoneVerified=false; S.phoneCode=""; S.phoneTimer=180;
  clearInterval(phoneTimerInterval);
  phoneTimerInterval = setInterval(()=>{
    S.phoneTimer--;
    if(S.phoneTimer<=0){ clearInterval(phoneTimerInterval); S.phoneCodeSent=false; }
    render();
  },1000);
  render();
}
function verifyPhoneCode(){
  if(S.phoneCode.length>=4){ S.phoneVerified=true; S.phoneCodeSent=false; clearInterval(phoneTimerInterval); render(); }
}
function onPhoneChange(v){
  S.patientPhone=v;
  if(S.originalPhone && v===S.originalPhone){
    S.phoneVerified=true; S.phoneCodeSent=false; S.phoneCode=""; clearInterval(phoneTimerInterval);
  } else {
    S.phoneVerified=false; S.phoneCodeSent=false; S.phoneCode=""; clearInterval(phoneTimerInterval);
  }
  render();
}
function fmtTimer(s){ return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60; }

/* ═══ CERT PROGRESS ANIMATION ═══ */
let certInterval = null;
function startLoading() {
  S.certComplete = false;
  clearInterval(certInterval);
  const duration = 3500;
  const start = Date.now();
  certInterval = setInterval(() => {
    const elapsed = Date.now() - start;
    const pct = Math.min(100, Math.round((elapsed / duration) * 100));
    const el = document.getElementById('cert-pct');
    if(el) el.textContent = pct + '%';
    if(pct >= 100){
      clearInterval(certInterval);
      S.certComplete = true;
      setTimeout(()=>{
        const btn = document.getElementById('save-btn');
        const sub = document.getElementById('save-sub');
        const label = document.getElementById('pct-label');
        if(btn) btn.classList.add('show');
        if(sub) sub.classList.add('show');
        if(label) label.style.opacity='0';
      }, 500);
    }
  }, 50);
}

function completeLogin(method) {
  S.loginMethod = method;
  S.loggedIn = true;
  S.showLoginSheet = false;
  if(method==='kakao'){
    S.patientName = '홍길동';
    S.patientPhone = '010-1234-5678';
    S.originalPhone = '010-1234-5678';
    S.phoneVerified = true;
  }
  go('HOSPITAL');
}

function filteredHospitals() {
  if (!S.hospitalSearch) return HOSPITALS;
  const q = S.hospitalSearch.toLowerCase();
  return HOSPITALS.filter(h => h.name.toLowerCase().includes(q) || h.director.toLowerCase().includes(q) || h.addr.toLowerCase().includes(q));
}

/* ═══ RENDER ═══ */
function render(){
  const t=theme(), fi=flowIdx();
  const animClass = `step-content${prevDirection==='back'?' back':''}`;
  let h = '';

  /* PHONE FRAME */
  h += '<div class="phone-frame">';

  /* PROGRESS */
  if(fi>=0 && S.step!=="DONE"){
    h+='<div class="top-progress"><div class="top-progress-bars">';
    for(let i=0;i<4;i++) h+=`<div class="top-progress-bar" style="background:${i<=fi?t.navy:'var(--border)'}"></div>`;
    h+=`</div><div class="top-progress-info"><span class="top-progress-label">${STEP_NAMES[fi]}</span><span>${fi+1} / 4</span></div></div>`;
  }

  h += `<div class="${animClass}">`;

  /* ══════ LANDING ══════ */
  if(S.step==="LOADING"){
    const done = S.certComplete;
    h+=`<div class="cert-landing">`;
    h+=`<div class="cert-landing-brand">Pharma Research</div>`;
    h+=`<div class="cert-landing-title">리쥬란 정품 인증서</div>`;
    h+=`<div class="cert-progress">`;
    h+=`<div class="cert-progress-pct" id="cert-pct" style="color:${t.primary}">${done?'100':'0'}%</div>`;
    h+=`<div class="cert-progress-bar-wrap"><div class="cert-progress-bar-fill" style="background:linear-gradient(90deg,${t.navy},${t.primary})${done?';width:100%;animation:none':''}"></div></div>`;
    h+=`<div class="cert-progress-label" id="pct-label" style="${done?'opacity:0':''}">인증서를 발급하고 있습니다</div>`;
    h+=`</div>`;
    h+=`<div class="cert-card-scene"><div class="cert-card-wrap">`;
    h+=`<img src="${CARD_IMG}" alt="리쥬란 정품 인증서">`;
    h+=`<div class="cert-card-mask ${done?'done':''}"></div>`;
    h+=`<div class="cert-card-scanline ${done?'done':''}" style="color:${t.primary}"></div>`;
    h+=`<div class="cert-card-shimmer ${done?'done':''}"></div>`;
    h+=`</div></div>`;

    h+=`<button class="btn-save-mobile show" id="save-btn" style="background:${t.navy};color:${t.tp}" onclick="S.showLoginSheet=true;S.altLoginOpen=false;render()">`;
    h+=`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;
    h+=`모바일에 저장하기</button>`;
    h+=`<div class="save-sub show" id="save-sub">인증서를 내 휴대폰에 안전하게 보관하세요</div>`;
    h+=`</div>`;
  }

  /* ══════ STEP 1 — HOSPITAL ══════ */
  else if(S.step==="HOSPITAL"){
    h+=`<div class="section-pad">`;
    h+=`<div style="margin-bottom:16px"><h2 class="section-title">시술 병원 선택</h2><p class="body-text">리쥬란 시술을 받으신 병원을 선택해주세요.</p></div>`;
    h+=`<div class="hospital-search-wrap">`;
    h+=`<div class="search-box"><svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8B95A1" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg><input class="text-input" style="padding-left:40px" placeholder="병원명, 원장명, 주소로 검색" value="${S.hospitalSearch}" oninput="S.hospitalSearch=this.value;render()"></div>`;
    const fh = filteredHospitals();
    if(fh.length > 0){
      h+=`<div class="hospital-list">`;
      fh.forEach(hp=>{
        const sel=S.hospital&&S.hospital.director===hp.director;
        const initial = hp.name.replace(/(피부과|의원|클리닉).*$/,'').slice(-2) || hp.name.slice(0,2);
        h+=`<div class="hospital-item" style="background:${sel?t.lighter:'var(--bg)'}" onclick="S.hospital=${JSON.stringify(hp).replace(/"/g,'&quot;')};render()">`;
        h+=`<div style="display:flex;gap:8px;align-items:center">`;
        h+=`<div style="width:36px;height:36px;border-radius:var(--r);background:${hp.color}18;border:1.5px solid ${hp.color}40;display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="font-size:12px;font-weight:800;color:${hp.color}">${initial}</span></div>`;
        h+=`<div style="flex:1;min-width:0">`;
        h+=`<div style="font-size:14px;font-weight:700;color:var(--text-1)">${hp.name}</div>`;
        h+=`<div style="font-size:11px;color:var(--text-3);margin-top:2px">대표원장: ${hp.director} · ${hp.addr}</div>`;
        h+=`</div>`;
        if(sel) h+=`<div style="color:${t.primary};font-size:16px;flex-shrink:0">✓</div>`;
        h+=`</div></div>`;
      });
      h+=`</div>`;
    } else {
      h+=`<div style="text-align:center;padding:16px 0;color:var(--text-3);font-size:13px">검색 결과가 없습니다</div>`;
    }
    h+=`</div>`;
    h+=`<button class="btn-primary" style="${pbs(!S.hospital)}" ${S.hospital?'':`disabled`} onclick="go('PATIENT')">다음 단계로</button>`;
    h+=`</div>`;
  }

  /* ══════ STEP 2 — PATIENT ══════ */
  else if(S.step==="PATIENT"){
    h+=`<div class="section-pad">`;
    h+=`<div style="margin-bottom:16px"><h2 class="section-title">시술 정보</h2><p class="body-text">인증서에 기재될 시술 정보를 입력해주세요.</p></div>`;

    const isKakao = S.loginMethod==='kakao';
    h+=`<div style="margin-bottom:8px"><label class="field-label">성명 ${isKakao?'':'<span class="required">*</span>'}</label><input class="text-input" ${isKakao?`value="${S.patientName}"`:`placeholder="이름을 입력하세요" value="${S.patientName}"`} oninput="S.patientName=this.value"></div>`;

    h+=`<div style="margin-bottom:8px"><label class="field-label">전화번호 <span class="required">*</span></label>`;
    h+=`<div style="display:flex;gap:8px">`;
    h+=`<input class="text-input" type="tel" ${isKakao?`value="${S.patientPhone}"`:`placeholder="전화번호를 입력하세요" value="${S.patientPhone}"`} oninput="onPhoneChange(this.value)" style="flex:1">`;
    if(S.phoneVerified){
      h+=`<div style="min-width:68px;height:42px;border-radius:var(--r);background:${t.lighter};color:${t.primary};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700">✓ 인증됨</div>`;
    } else {
      h+=`<button style="min-width:68px;height:42px;border-radius:var(--r);border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:${S.patientPhone&&!S.phoneCodeSent?t.navy:'var(--bg-3)'};color:${S.patientPhone&&!S.phoneCodeSent?t.tp:'var(--text-3)'}" ${S.patientPhone&&!S.phoneCodeSent?'':'disabled'} onclick="sendPhoneCode()">${S.phoneCodeSent?'재전송':'인증요청'}</button>`;
    }
    h+=`</div>`;
    if(S.phoneCodeSent&&!S.phoneVerified){
      h+=`<div style="display:flex;gap:8px;margin-top:8px">`;
      h+=`<div style="flex:1;position:relative"><input class="text-input" type="tel" placeholder="인증번호 입력" maxlength="6" value="${S.phoneCode}" oninput="S.phoneCode=this.value;render()" style="padding-right:56px"><span style="position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:13px;font-weight:600;color:#F45452">${fmtTimer(S.phoneTimer)}</span></div>`;
      h+=`<button style="min-width:68px;height:42px;border-radius:var(--r);border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;background:${S.phoneCode.length>=4?t.navy:'var(--bg-3)'};color:${S.phoneCode.length>=4?t.tp:'var(--text-3)'}" ${S.phoneCode.length>=4?'':'disabled'} onclick="verifyPhoneCode()">확인</button>`;
      h+=`</div>`;
    }
    h+=`</div>`;

    h+=`<div style="margin-bottom:8px"><label class="field-label">시술일자 <span class="required">*</span></label><input class="text-input" type="date" value="${S.procedureDate}" oninput="S.procedureDate=this.value"></div>`;

    h+=`<div style="margin-bottom:8px"><label class="field-label">시술 부위</label>`;
    h+=`<select class="select-input" onchange="S.procedureArea=this.value"><option value="페이스 전체" ${S.procedureArea==='페이스 전체'?'selected':''}>페이스 전체</option><option value="이마" ${S.procedureArea==='이마'?'selected':''}>이마</option><option value="눈가" ${S.procedureArea==='눈가'?'selected':''}>눈가</option><option value="볼" ${S.procedureArea==='볼'?'selected':''}>볼</option><option value="목" ${S.procedureArea==='목'?'selected':''}>목</option><option value="두피" ${S.procedureArea==='두피'?'selected':''}>두피</option></select></div>`;

    /* CC 용량 선택 */
    h+=`<div style="margin-bottom:8px"><label class="field-label">시술 용량 (cc) <span class="required">*</span></label>`;
    h+=`<div style="display:flex;gap:6px">`;
    ["1","2","3","4","5"].forEach(cc=>{
      const sel = S.procedureCC===cc;
      h+=`<button style="flex:1;height:40px;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .12s;border:${sel?`2px solid ${t.navy}`:`1.5px solid var(--border)`};background:${sel?alpha(t.navy,0.06):'var(--bg)'};color:${sel?t.navy:'var(--text-3)'};${sel?`box-shadow:0 2px 8px ${alpha(t.navy,0.12)}`:''}" onclick="S.procedureCC='${cc}';render()">${cc}<span style="font-size:11px;font-weight:500;margin-left:1px">cc</span></button>`;
    });
    h+=`</div></div>`;

    h+=`<div style="margin-bottom:16px"><label class="field-label">생년월일 <span style="font-size:11px;color:var(--text-4)">(선택)</span></label><input class="text-input" type="date" value="${S.patientBirth}" oninput="S.patientBirth=this.value"></div>`;

    /* Consent */
    const allC=S.consentPrivacy&&S.consentThirdParty;
    h+=`<div style="background:var(--bg-2);border:1px solid var(--border);border-radius:var(--r);padding:8px 16px;margin-bottom:16px">`;
    h+=`<div style="display:flex;align-items:center;gap:8px;cursor:pointer;min-height:40px" onclick="var n=!(S.consentPrivacy&&S.consentThirdParty);S.consentPrivacy=n;S.consentThirdParty=n;render()"><div class="cb lg ${allC?'on':''}" style="${allC?`border-color:${t.primary};background:${t.navy};color:${t.tp}`:''}">✓</div><span style="font-size:13px;font-weight:600;color:var(--text-1)">전체 동의</span></div>`;
    h+=`<div style="border-top:1px solid var(--border);padding-top:4px">`;
    [[S.consentPrivacy,"Privacy","개인정보 수집 동의",true],[S.consentThirdParty,"ThirdParty","개인정보 제3자 제공 동의",true]].forEach(([v,k,lb,rq])=>{
      h+=`<div style="display:flex;align-items:center;gap:8px;cursor:pointer;min-height:36px" onclick="S.consent${k}=!S.consent${k};render()"><div class="cb sm ${v?'on':''}" style="${v?`border-color:${t.primary};background:${t.navy};color:${t.tp}`:''}">✓</div><span style="font-size:12px;color:var(--text-2)">${lb} <span style="font-size:11px;color:${rq?'#F45452':'var(--text-4)'}">${rq?'(필수)':'(선택)'}</span></span></div>`;
    });
    h+=`</div></div>`;

    const s1v=step1Valid();
    h+=`<div class="btn-row"><button class="btn-secondary" onclick="go('HOSPITAL')">이전</button><button class="btn-primary" style="flex:2;${pbs(!s1v)}" ${s1v?'':`disabled`} onclick="if(${s1v}){go('PRODUCT')}">다음 단계로</button></div>`;
    h+=`</div>`;
  }

  /* ══════ STEP 3 — PRODUCT ══════ */
  else if(S.step==="PRODUCT"){
    h+=`<div class="section-pad">`;
    const procs=procList();
    const curProc=S.selectedProcedure||procs[0];
    const prods=PRODUCTS[curProc]||[];

    h+=`<div style="margin-bottom:20px"><h2 class="section-title">제품 등록</h2><p class="body-text">시술에 사용된 리쥬란 제품을 등록해주세요.</p></div>`;

    /* 시술 탭 */
    if(procs.length>1){
      h+=`<div class="proc-tabs">`;
      procs.forEach(p=>{
        const act=curProc===p;
        h+=`<button class="proc-tab" style="border:${act?`2px solid ${t.navy}`:`1.5px solid var(--border)`};background:${act?alpha(t.navy,0.06):'var(--bg-2)'};color:${act?t.navy:'var(--text-3)'}" onclick="S.selectedProcedure='${p}';S.authMethod=null;S.selectedProduct='';render()">${p}</button>`;
      });
      h+=`</div>`;
    }

    if(S.products.length>0){
      h+=`<div style="margin-bottom:16px">`;
      S.products.forEach(p=>{
        h+=`<div class="product-card" style="background:${t.lighter};border:1px solid ${t.border}"><div class="product-info"><span class="product-name">${p.name}</span><span class="chip" style="${chipStyle()}">${p.method==='simple'?'간편':'정품 ✓'}</span>${p.procedure?`<span class="chip" style="background:var(--bg-2);color:var(--text-3)">${p.procedure}</span>`:''}</div><button class="remove-btn" onclick="S.products=S.products.filter(x=>x.id!==${p.id});render()">×</button></div>`;
      });
      h+=`</div>`;
    }

    if(!S.authMethod || S.authMethod==='simple'){
      h+=`<div class="auth-methods">`;
      h+=`<div style="border:2px solid ${t.navy};background:${alpha(t.navy,0.04)};border-radius:var(--r2);padding:16px">`;
      h+=`<div style="font-size:14px;font-weight:700;color:${t.navy};margin-bottom:4px">⚡ 간편 발행</div>`;
      h+=`<div style="font-size:12px;color:var(--text-3);margin-bottom:8px">제품명을 선택하여 인증서를 바로 발행합니다</div>`;
      h+=`<select class="select-input" style="border-color:${t.border}" onchange="if(this.value){S.products.push({id:Date.now(),name:this.value,method:'simple',procedure:'${curProc}'});S.selectedProduct='';render()}"><option value="">제품을 선택하세요</option>`;
      prods.forEach(p=>{ h+=`<option value="${p}">${p}</option>`; });
      h+=`</select></div>`;
      h+=`<button style="padding:16px;background:var(--bg);border-radius:var(--r2);cursor:pointer;text-align:left;font-family:inherit;border:1.5px solid var(--border)" onclick="S.authMethod='scan';render()"><div style="font-size:14px;font-weight:700;margin-bottom:4px;color:var(--text-2)">📷 정품 인증</div><div style="font-size:12px;color:var(--text-3)">제품 QR코드 스캔 또는 바코드 직접 입력</div></button>`;
      h+=`</div>`;
    }

    if(S.authMethod==="scan"){
      h+=`<div class="scan-panel"><div class="panel-header"><span class="panel-title">📷 정품 인증</span><button class="link-btn" style="color:${t.primary}" onclick="S.authMethod=null;render()">← 돌아가기</button></div>`;
      h+=`<div class="camera-mock"><div style="font-size:40px;margin-bottom:8px">📷</div><div style="font-size:13px;color:#848A96">카메라 뷰파인더</div><div style="font-size:12px;color:#5A6070;margin-top:4px">제품 S/N 바코드를 스캔하세요</div></div>`;
      h+=`<div class="scan-divider" style="margin-top:16px">또는 직접 입력</div><div class="scan-input-row"><input class="text-input" placeholder="바코드/S/N 번호 입력" value="${S.barcodeInput}" oninput="S.barcodeInput=this.value" style="flex:1">`;
      h+=`<button class="scan-submit-btn" style="background:${S.barcodeInput?t.navy:'var(--border)'};color:${S.barcodeInput?t.tp:'var(--text-3)'}" ${S.barcodeInput?'':`disabled`} onclick="if(S.barcodeInput){S.products.push({id:Date.now(),name:'REJURAN (S/N: '+S.barcodeInput+')',method:'scan',procedure:'${curProc}'});S.authMethod=null;S.barcodeInput='';render()}">인증</button></div></div>`;
    }

    const hasProd=S.products.length>0;
    h+=`<div class="btn-row" style="margin-top:18px"><button class="btn-secondary" onclick="go('PATIENT')">이전</button><button class="btn-primary" style="flex:2;${pbs(!hasProd)}" ${hasProd?'':`disabled`} onclick="if(S.products.length>0)go('CONFIRM')">다음 (${S.products.length}개 제품)</button></div>`;
    h+=`</div>`;
  }

  /* ══════ STEP 4 — CONFIRM ══════ */
  else if(S.step==="CONFIRM"){
    h+=`<div class="section-pad">`;
    h+=`<div style="margin-bottom:20px"><h2 class="section-title">확인 및 발행</h2><p class="body-text">아래 정보로 리쥬란 인증서를 발행합니다.</p></div>`;

    h+=`<div class="review-card"><div class="review-header"><span class="review-label">시술 병원</span><button class="link-btn" style="color:${t.primary}" onclick="go('HOSPITAL')">수정</button></div><div class="review-hospital-name">${S.hospital?.name||'강남 아이디피부과'}</div><div class="review-director" style="color:${t.primary}">${S.hospital?.director||'김수연'} 원장</div></div>`;

    h+=`<div class="review-card"><div class="review-header"><span class="review-label">시술 정보</span><button class="link-btn" style="color:${t.primary}" onclick="go('PATIENT')">수정</button></div>`;
    [["성명",S.patientName||"홍길동"],["전화번호",S.patientPhone||"010-1234-5678"],["시술일자",S.procedureDate||"2026-03-13"],["시술 부위",S.procedureArea||"페이스 전체"],["시술 용량",(S.procedureCC||"2")+"cc"]].forEach(([k,v])=>{ h+=`<div class="review-row"><span>${k}</span><strong>${v}</strong></div>`; });
    if(S.patientBirth) h+=`<div class="review-row"><span>생년월일</span><strong>${S.patientBirth}</strong></div>`;
    h+=`<div class="chip-row"><span class="chip" style="${chipStyle()}">✓ 개인정보 수집</span>`;
    h+=`<span class="chip" style="${chipStyle()}">✓ 제3자 제공</span>`;
    h+=`<span class="chip" style="${chipStyle()}">✓ ${CH_LABELS[S.messageChannel]}</span></div></div>`;

    h+=`<div class="review-card"><div class="review-header"><span class="review-label">인증 제품 (${S.products.length}개)</span><button class="link-btn" style="color:${t.primary}" onclick="go('PRODUCT')">수정</button></div>`;
    S.products.forEach((p,i)=>{ h+=`<div class="review-product" style="${i>0?'border-top:1px solid var(--border)':''}"><span class="body-text">${p.name}</span><div style="display:flex;gap:8px">${p.procedure?`<span class="chip" style="background:var(--bg-2);color:var(--text-3)">${p.procedure}</span>`:''}<span class="chip" style="${chipStyle()}">${p.method==='simple'?'간편':'정품 ✓'}</span></div></div>`; });
    h+=`</div>`;

    h+=`<div class="warn-banner">⚠️ 발행 후에는 수정이 불가합니다.</div>`;
    h+=`<div class="btn-row"><button class="btn-secondary" onclick="go('PRODUCT')">이전</button><button class="btn-primary" style="flex:2;${pbs(false)}" onclick="S.showConfirmModal=true;render()">인증서 발행</button></div>`;

    h+=`</div>`;
  }

  /* ══════ DONE ══════ */
  else if(S.step==="DONE"){
    h+=`<div class="section-pad"><div class="center-view" style="padding-top:32px">`;
    h+=`<div class="done-icon" style="background:linear-gradient(135deg,${t.navy} 0%,${alpha(t.primary,0.8)} 100%);color:${t.tp};box-shadow:0 8px 32px ${alpha(t.navy,0.3)}">✓</div>`;
    h+=`<h2 class="hero-title">인증서가 발행되었습니다</h2>`;
    h+=`<p class="body-text" style="margin-bottom:4px">${CH_LABELS[S.messageChannel]}으로 인증서가 발송되었습니다.</p>`;
    h+=`<p class="text-muted" style="margin-bottom:28px">${S.patientPhone||'010-1234-5678'}</p>`;

    h+=`<div class="summary-card"><div class="summary-label">발행 내역</div><div class="summary-body">`;
    h+=`<div>🏥 ${S.hospital?.name||'강남 아이디피부과'} (${S.hospital?.director||'김수연'} 원장)</div>`;
    h+=`<div>👤 ${S.patientName||'홍길동'} (${S.patientPhone||'010-1234-5678'})</div>`;
    h+=`<div>📅 ${S.procedureDate||'2026-03-13'} · ${S.procedureArea||'페이스 전체'} · ${S.procedureCC||'2'}cc</div>`;
    h+=`<div>📦 제품 ${S.products.length}개 인증</div></div></div>`;

    h+=`<div class="cert-cta" style="background:${t.light};border:1px solid ${t.border}"><div class="cta-title" style="color:${t.primary}">🎉 내 인증서를 확인하세요</div><div class="cta-desc">발급받은 인증서를 언제든 조회할 수 있으며,<br>회원 탈퇴 시 수집된 개인정보가 즉시 파기됩니다.</div></div>`;
    h+=`<button class="btn-primary" style="${pbs(false)}" onclick="window.open('https://customer.certi.life/my-certs','_blank')">내 인증서 보러가기 →</button></div>`;
    h+=`</div>`;
  }

  h += '</div>'; // step-content

  /* ══ OVERLAYS (absolute within phone-frame) ══ */
  if(S.showLoginSheet){
    h+=`<div class="login-sheet-backdrop" onclick="S.showLoginSheet=false;render()">`;
    h+=`<div class="login-sheet" onclick="event.stopPropagation()">`;
    h+=`<div class="sheet-handle"></div>`;
    h+=`<div class="sheet-title">로그인하고 인증서를<br>저장하세요</div>`;
    h+=`<div class="sheet-desc">로그인하면 인증서를 내 계정에 안전하게<br>저장하고 언제든 조회할 수 있어요.</div>`;
    h+=`<button class="btn-kakao" onclick="completeLogin('kakao')">${KAKAO_SVG}&nbsp;&nbsp;카카오로 시작하기</button>`;
    h+=`<button class="alt-login-toggle ${S.altLoginOpen?'open':''}" onclick="S.altLoginOpen=!S.altLoginOpen;render()">다른 방법으로 시작 <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 4.5L6 7.5L9 4.5" stroke="#8B95A1" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>`;
    h+=`<div class="alt-methods ${S.altLoginOpen?'expanded':'collapsed'}">`;
    h+=`<button class="btn-apple" onclick="completeLogin('apple')">${APPLE_SVG}&nbsp;&nbsp;Apple로 계속하기</button>`;
    h+=`<button class="btn-email-signup" onclick="completeLogin('email')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="M2 7l10 7 10-7"/></svg>&nbsp;&nbsp;이메일로 회원가입</button>`;
    h+=`</div></div></div>`;
  }
  if(S.showConfirmModal){
    h+=`<div class="modal-backdrop" onclick="S.showConfirmModal=false;render()"><div class="modal-sheet" onclick="event.stopPropagation()">`;
    h+=`<div class="modal-handle"></div><div class="modal-title">인증서를 발행하시겠습니까?</div><div class="modal-desc">발행 후에는 수정이 불가합니다.<br>정보를 다시 한번 확인해 주세요.</div>`;
    h+=`<div class="btn-row"><button class="btn-ghost" style="flex:1" onclick="S.showConfirmModal=false;render()">취소</button><button class="btn-primary" style="flex:2;${pbs(false)}" onclick="S.showConfirmModal=false;go('DONE')">발행하기</button></div>`;
    h+=`</div></div>`;
  }

  h += '</div>'; // phone-frame

  document.getElementById('app').innerHTML = h;
}

render();
startLoading();
</script>
</body>
</html>
